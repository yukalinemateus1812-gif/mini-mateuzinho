<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Teste API</title>
<style>
body{background:#0a0a1a;color:#fff;font-family:monospace;padding:30px}
.pass{color:#2ecc71}.fail{color:#e74c3c}.log{background:#111;padding:10px;margin:5px 0;border-radius:8px}
button{background:#c44dff;color:#fff;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;font-size:1em;margin:5px}
button:hover{background:#ff6b9d}
</style></head><body>
<h2>🔧 Diagnóstico da API</h2>
<div id="log"></div>
<button onclick="testar()">▶️ Iniciar Testes</button>
<script>
function log(msg,ok){var d=document.createElement("div");d.className="log";d.innerHTML=(ok===true?'<span class=pass>✅':'<span class=fail>❌')+' '+msg+'</span>';document.getElementById("log").appendChild(d)}
function testar(){
document.getElementById("log").innerHTML="";
log("Iniciando testes em http://localhost:8080...");

fetch("/api/health")
.then(function(r){if(!r.ok)throw Error("Status "+r.status);return r.json()})
.then(function(d){log("GET /api/health: "+JSON.stringify(d),true)})
.catch(function(e){log("GET /api/health: "+e.message,false)});

fetch("/api/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({room:"teste123",de:"cliente",msg:"msg de teste"})})
.then(function(r){if(!r.ok)throw Error("Status "+r.status);return r.json()})
.then(function(d){log("POST /api/send: "+JSON.stringify(d),true)})
.catch(function(e){log("POST /api/send: "+e.message,false)});

setTimeout(function(){
fetch("/api/admin")
.then(function(r){if(!r.ok)throw Error("Status "+r.status);return r.json()})
.then(function(d){log("GET /api/admin: "+JSON.stringify(d),true)})
.catch(function(e){log("GET /api/admin: "+e.message,false)});
},500);

setTimeout(function(){
fetch("/api/msgs?room=teste123&since=0")
.then(function(r){if(!r.ok)throw Error("Status "+r.status);return r.json()})
.then(function(d){log("GET /api/msgs?room=teste123: "+JSON.stringify(d),true)})
.catch(function(e){log("GET /api/msgs?room=teste123: "+e.message,false)});
},1000);
}
</script>
</body></html>
