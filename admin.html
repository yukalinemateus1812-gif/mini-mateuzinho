<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Admin • Mini Mateuzinho</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:Segoe UI,sans-serif;height:100vh;display:flex;overflow:hidden}
.sidebar{width:260px;background:#111133;padding:20px;display:flex;flex-direction:column;border-right:1px solid rgba(255,107,157,.2);flex-shrink:0}
.sidebar h2{font-size:1.1em;background:linear-gradient(45deg,#ff6b9d,#c44dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:15px}
.sidebar h3{color:#888;font-size:.7em;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px}
.room-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:10px;border:1px solid rgba(196,77,255,.3);background:rgba(196,77,255,.05);color:#ccc;cursor:pointer;text-align:left;font-size:.85em;transition:all .2s}
.room-btn:hover{background:rgba(196,77,255,.15);border-color:#c44dff}
.room-btn.active{background:rgba(255,107,157,.15);border-color:#ff6b9d;color:#ff6b9d;font-weight:bold}
.room-badge{float:right;background:#ff6b9d;color:#fff;border-radius:50%;min-width:22px;height:22px;text-align:center;line-height:22px;font-size:.7em;font-weight:bold}
.main{flex:1;display:flex;flex-direction:column}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#0d0d25;border-bottom:1px solid rgba(255,107,157,.15)}
.topbar h1{font-size:1.1em;color:#c44dff}
.online{color:#2ecc71;font-size:.75em}
.online::before{content:"● ";font-size:1em}
.msgs{flex:1;overflow-y:auto;padding:15px 20px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:75%;padding:10px 14px;border-radius:14px;font-size:.82em;line-height:1.4;animation:slide .25s ease}
@keyframes slide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.client{background:#1a1a3e;align-self:flex-start;border-bottom-left-radius:4px;border-left:3px solid #ff6b9d}
.msg.admin{background:linear-gradient(135deg,#ff6b9d,#c44dff);align-self:flex-end;border-bottom-right-radius:4px}
.msg.system{background:rgba(37,211,102,.1);align-self:center;border:1px solid rgba(37,211,102,.3);font-size:.72em;color:#a0e0b0;text-align:center;max-width:90%}
.msg .time{font-size:.65em;color:rgba(255,255,255,.5);margin-top:3px;display:block}
.input-area{display:flex;gap:8px;padding:12px 20px;background:#0d0d25;border-top:1px solid rgba(255,107,157,.15)}
.input-area input{flex:1;padding:12px 16px;border-radius:20px;border:1px solid rgba(196,77,255,.3);background:#111133;color:#fff;outline:none;font-size:.9em}
.input-area input:focus{border-color:#c44dff}
.input-area button{background:linear-gradient(45deg,#ff6b9d,#c44dff);border:none;color:#fff;min-width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:1.1em;font-weight:bold}
.input-area button:hover{transform:scale(1.1)}
.empty{text-align:center;color:#555;font-size:.85em;margin-top:40px}
.empty .icon{font-size:50px;margin-bottom:10px}
.btn-clear{background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.3);color:#f66;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.7em}
.btn-clear:hover{background:rgba(255,0,0,.2)}
#debug{position:fixed;bottom:0;left:0;right:0;background:#000;color:#0f0;font-size:10px;padding:4px 8px;max-height:80px;overflow-y:auto;z-index:999;font-family:monospace;display:none}
</style>
</head>
<body>
<div class="sidebar">
  <h2>🤖 Mini Mateuzinho</h2>
  <p style="color:#888;font-size:.7em;margin-bottom:15px">Painel de Atendimento</p>
  <h3>Clientes Conectados</h3>
  <div id="roomList"><p style="color:#555;font-size:.75em;text-align:center;padding:20px 0">Carregando...</p></div>
  <div style="margin-top:auto;padding-top:15px;border-top:1px solid rgba(255,255,255,.05)">
    <button class="btn-clear" onclick="limparTudo()" style="width:100%;padding:8px">🗑️ Limpar conversa atual</button>
    <p style="color:#555;font-size:.6em;text-align:center;margin-top:10px">v3.0 • Admin PC</p>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div>
      <h1 id="headerTitle">📋 Selecione um cliente</h1>
      <span class="online" id="headerStatus" style="display:none">Cliente online</span>
    </div>
    <span id="msgCount" style="color:#888;font-size:.75em"></span>
  </div>
  <div class="msgs" id="msgs">
    <div class="empty"><div class="icon">💜</div><p>Selecione um cliente na barra lateral<br>para começar o atendimento</p></div>
  </div>
  <div class="input-area">
    <input id="inp" placeholder="Digite sua resposta como Mini Mateuzinho...">
    <button id="btnSend">➤</button>
  </div>
</div>
<div id="debug"></div>
<script>
var API = window.location.origin;
var cr = null, pt = null, lt = 0;

function log(msg) {
  var d = document.getElementById("debug");
  d.style.display = "block";
  d.innerHTML += msg + "\n";
  console.log("[ADMIN]", msg);
}
log("🚀 Admin v3 iniciado. API=" + API);

function selectRoom(r) {
  cr = r; lt = 0;
  document.getElementById("headerTitle").textContent = "💬 Atendendo: " + r;
  document.getElementById("headerStatus").style.display = "inline";
  document.getElementById("msgs").innerHTML = "";
  document.querySelectorAll(".room-btn").forEach(function(b) {
    b.classList.toggle("active", b.dataset.room == r);
  });
  carregarMsgs();
  if (pt) clearInterval(pt);
  pt = setInterval(pollMsgs, 1500);
}

function carregarMsgs() {
  var url = API + "/api/msgs?room=" + encodeURIComponent(cr) + "&since=0";
  fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    lt = d.total; renderMsgs(d.msgs);
    document.getElementById("msgCount").textContent = d.total + " mensagens";
  }).catch(function(e) { log("❌ carregarMsgs: " + e.message); });
}

function pollMsgs() {
  if (!cr) return;
  var url = API + "/api/msgs?room=" + encodeURIComponent(cr) + "&since=" + lt;
  fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    if (d.msgs.length > 0) {
      for (var i = 0; i < d.msgs.length; i++) appendMsg(d.msgs[i]);
      lt = d.total;
      document.getElementById("msgCount").textContent = lt + " mensagens";
    }
  }).catch(function(e) { log("❌ pollMsgs: " + e.message); });
  atualizarSalas();
}

function renderMsgs(msgs) {
  var el = document.getElementById("msgs"); el.innerHTML = "";
  if (msgs.length == 0) {
    el.innerHTML = '<div class="empty"><div class="icon">💜</div><p>Nenhuma mensagem ainda</p></div>';
    return;
  }
  for (var i = 0; i < msgs.length; i++) appendMsg(msgs[i]);
}

function appendMsg(m) {
  var el = document.getElementById("msgs");
  if (el.querySelector(".empty")) el.innerHTML = "";
  var div = document.createElement("div");
  var cls = m.de == "cliente" ? "client" : m.de == "servico" ? "system" : "admin";
  if (m.de == "mateuzinho") cls = "admin";
  div.className = "msg " + cls;
  var prefix = cls == "client" ? "👤 <b>Cliente:</b> " : cls == "admin" ? "💚 <b>Você (Mini):</b> " : "🤖 ";
  div.innerHTML = prefix + m.msg + '<span class="time">' + (m.h || "") + '</span>';
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function atualizarSalas() {
  fetch(API + "/api/admin").then(function(r) { return r.json(); }).then(function(data) {
    var list = document.getElementById("roomList");
    var names = Object.keys(data);
    if (names.length == 0) {
      list.innerHTML = '<p style="color:#555;font-size:.75em;text-align:center;padding:20px 0">Aguardando clientes...</p>';
      return;
    }
    list.innerHTML = "";
    for (var i = 0; i < names.length; i++) {
      var n = names[i], info = data[n];
      var btn = document.createElement("button");
      btn.className = "room-btn";
      if (n == cr) btn.classList.add("active");
      btn.dataset.room = n;
      btn.innerHTML = (n == "sasa" ? "🌸 Mei Mei" : "✨ Kael") + ' <span class="room-badge">' + info.total + '</span>';
      btn.onclick = function() { selectRoom(this.dataset.room); };
      list.appendChild(btn);
    }
  }).catch(function(e) { log("❌ atualizarSalas: " + e.message); });
}

function enviar() {
  var inp = document.getElementById("inp"), msg = inp.value.trim();
  if (!msg || !cr) return;
  inp.value = "";
  fetch(API + "/api/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room: cr, de: "mateuzinho", msg: msg })
  }).then(function(r) { return r.json(); }).then(function() { pollMsgs(); })
    .catch(function(e) { log("❌ enviar: " + e.message); });
}

function limparTudo() {
  if (!cr || !confirm("Limpar conversa com " + cr + "?")) return;
  fetch(API + "/api/clear?room=" + encodeURIComponent(cr)).then(function() {
    lt = 0;
    document.getElementById("msgs").innerHTML = '<div class="empty"><div class="icon">💜</div><p>Conversa limpa!</p></div>';
    document.getElementById("msgCount").textContent = "0 mensagens";
    atualizarSalas();
  }).catch(function(e) { log("❌ limparTudo: " + e.message); });
}

document.getElementById("btnSend").addEventListener("click", enviar);
document.getElementById("inp").addEventListener("keypress", function(e) {
  if (e.key == "Enter") enviar();
});

log("▶️ Iniciando polling...");
atualizarSalas();
setInterval(atualizarSalas, 3000);
</script>
</body>
</html>
