<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Admin • Mini Mateuzinho</title>
<style>
:root{--bg:#0a0a1a;--bg2:#111133;--bg3:#0d0d25;--pink:#ff6b9d;--purple:#c44dff;--green:#25d366;--text:#e0e0e0;--text2:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
.sidebar{width:270px;background:linear-gradient(180deg,#121240,#0d0d2b);padding:24px 18px;display:flex;flex-direction:column;border-right:1px solid rgba(255,107,157,.15);flex-shrink:0}
.sidebar .logo{text-align:center;margin-bottom:20px}
.sidebar .logo h2{font-size:1.1em;background:linear-gradient(45deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.sidebar .logo .badge{font-size:.65em;color:var(--text2);background:rgba(255,107,157,.1);padding:3px 10px;border-radius:10px;display:inline-block}
.sidebar h3{color:var(--text2);font-size:.65em;text-transform:uppercase;letter-spacing:2px;margin:15px 0 8px}
.room-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;margin:3px 0;border-radius:12px;border:1px solid rgba(196,77,255,.15);background:rgba(196,77,255,.03);color:var(--text);cursor:pointer;font-size:.82em;transition:all .25s}
.room-btn:hover{background:rgba(196,77,255,.1);border-color:var(--purple);transform:translateX(3px)}
.room-btn.active{background:linear-gradient(135deg,rgba(255,107,157,.15),rgba(196,77,255,.1));border-color:var(--pink)}
.room-btn .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.room-btn.sasa .avatar{background:rgba(255,107,157,.15)}
.room-btn.kael .avatar{background:rgba(196,77,255,.15)}
.room-btn .info{flex:1;text-align:left}
.room-btn .name{font-weight:600;font-size:.9em}
.room-btn .preview{font-size:.7em;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.room-badge{background:var(--pink);color:#fff;border-radius:50%;min-width:22px;height:22px;text-align:center;line-height:22px;font-size:.65em;font-weight:700}
.main{flex:1;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:linear-gradient(180deg,var(--bg2),rgba(17,17,51,.7));border-bottom:1px solid rgba(255,107,157,.1);min-height:68px}
.topbar h1{font-size:1.1em;color:var(--text);font-weight:600}
.topbar .meta{display:flex;gap:20px;align-items:center}
.topbar .stat{text-align:center}
.topbar .stat .val{font-size:1em;font-weight:700;color:var(--purple)}
.topbar .stat .lbl{font-size:.6em;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.online-dot{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-size:.7em}
.online-dot::before{content:'';width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:8px}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,107,157,.2);border-radius:2px}
.msg-row{display:flex;gap:8px;max-width:78%;animation:msgIn .3s ease}
.msg-row.client{align-self:flex-start}
.msg-row.admin{align-self:flex-end;flex-direction:row-reverse}
.msg-row.system{align-self:center;max-width:90%}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;font-weight:700}
.msg-row.client .msg-avatar{background:rgba(255,107,157,.15)}
.msg-row.admin .msg-avatar{background:rgba(196,77,255,.15)}
.msg-bubble{background:var(--bg2);padding:10px 14px;border-radius:16px;font-size:.82em;line-height:1.5}
.msg-row.client .msg-bubble{border-bottom-left-radius:4px;border-left:2px solid var(--pink)}
.msg-row.admin .msg-bubble{background:linear-gradient(135deg,rgba(255,107,157,.25),rgba(196,77,255,.2));border-bottom-right-radius:4px}
.msg-row.system .msg-bubble{background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.15);font-size:.72em;color:#a0e0b0;text-align:center}
.msg-bubble .sender{font-size:.6em;color:var(--pink);font-weight:700;margin-bottom:2px}
.msg-bubble .time{font-size:.6em;color:var(--text2);margin-top:3px;text-align:right}
.input-area{display:flex;gap:10px;padding:14px 28px;background:linear-gradient(0deg,var(--bg2),rgba(17,17,51,.7));border-top:1px solid rgba(255,107,157,.1)}
.input-area input{flex:1;padding:12px 18px;border-radius:25px;border:1px solid rgba(196,77,255,.15);background:var(--bg3);color:#fff;outline:none;font-size:.85em}
.input-area input:focus{border-color:var(--purple)}
.input-area button{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:#fff;min-width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:1.1em}
.input-area button:hover{transform:scale(1.05)}
.empty-state{text-align:center;color:var(--text2);padding:60px 20px}
.empty-state .icon{font-size:60px;margin-bottom:15px;opacity:.6}
.empty-state h3{color:var(--text);margin-bottom:6px;font-size:1em}
.empty-state p{font-size:.8em}
.btn-clear{display:block;width:100%;padding:10px;margin-top:auto;background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.2);color:#f66;border-radius:10px;cursor:pointer;font-size:.72em}
.btn-clear:hover{background:rgba(255,0,0,.15)}
.sidebar-footer{text-align:center;color:var(--text2);font-size:.6em;padding-top:12px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px}
</style></head><body>
<div class="sidebar">
<div class="logo"><h2>🤖 Mini Mateuzinho</h2><span class="badge">Painel Admin v4</span></div>
<h3>👥 Clientes Conectados</h3>
<div id="roomList"><div class="empty-state"><div class="icon">💜</div><h3>Aguardando clientes</h3><p>Quando um cliente entrar no chat, ele aparecerá aqui</p></div></div>
<div style="flex:1"></div>
<button class="btn-clear" onclick="limparTudo()">🗑️ Limpar conversa atual</button>
<div class="sidebar-footer">Mini Mateuzinho © 2026</div>
</div>
<div class="main">
<div class="topbar">
<h1 id="headerTitle">📋 <span>Selecione um cliente</span></h1>
<div class="meta">
<div class="stat"><div class="val" id="statTotal">0</div><div class="lbl">Total Msgs</div></div>
<div class="stat"><span class="online-dot" id="headerStatus" style="display:none">Online</span></div>
</div>
</div>
<div class="msgs" id="msgs"><div class="empty-state"><div class="icon">💬</div><h3>Nenhuma conversa selecionada</h3><p>Selecione um cliente na barra lateral para ver as mensagens</p></div></div>
<div class="input-area">
<input id="inp" placeholder="Digite sua resposta como Mini Mateuzinho...">
<button id="btnSend">➤</button>
</div>
</div>
<script>
var API=window.location.origin;
var cr=null,pt=null,lt=0;

function log(m){console.log("[ADMIN]",m)}

function selectRoom(r){
cr=r;lt=0;
document.getElementById("headerTitle").innerHTML="💬 <span>Atendendo: "+r+"</span>";
document.getElementById("headerStatus").style.display="inline";
document.querySelectorAll(".room-btn").forEach(function(b){b.classList.toggle("active",b.dataset.room==r)});
carregarMsgs();
if(pt)clearInterval(pt);
pt=setInterval(pollMsgs,1500);
}

function carregarMsgs(){
fetch(API+"/api/msgs?room="+encodeURIComponent(cr)+"&since=0")
.then(function(r){return r.json()}).then(function(d){
lt=d.total;renderMsgs(d.msgs);
document.getElementById("statTotal").textContent=d.total;
}).catch(function(e){log("erro carregar: "+e.message)});
}

function pollMsgs(){
if(!cr)return;
fetch(API+"/api/msgs?room="+encodeURIComponent(cr)+"&since="+lt)
.then(function(r){return r.json()}).then(function(d){
if(d.msgs.length>0){
for(var i=0;i<d.msgs.length;i++)appendMsg(d.msgs[i]);
lt=d.total;
document.getElementById("statTotal").textContent=lt;
}
}).catch(function(e){});
atualizarSalas();
}

function renderMsgs(msgs){
var el=document.getElementById("msgs");el.innerHTML="";
if(msgs.length==0){el.innerHTML='<div class="empty-state"><div class="icon">💜</div><h3>Nenhuma mensagem</h3></div>';return}
for(var i=0;i<msgs.length;i++)appendMsg(msgs[i]);
}

function appendMsg(m){
var el=document.getElementById("msgs");
if(el.querySelector(".empty-state"))el.innerHTML="";
var row=document.createElement("div");
var cls=m.de=="cliente"?"client":m.de=="servico"?"system":"admin";
if(m.de=="mateuzinho")cls="admin";
row.className="msg-row "+cls;
var av=cls=="client"?"👤":cls=="admin"?"💚":"🤖";
var sender=cls=="client"?"<div class=sender>Cliente</div>":cls=="admin"?"<div class=sender>Você (Mini)</div>":"";
row.innerHTML='<div class="msg-avatar">'+av+'</div><div class="msg-bubble">'+sender+m.msg+'<div class="time">'+(m.h||"")+'</div></div>';
el.appendChild(row);el.scrollTop=el.scrollHeight;
}

function atualizarSalas(){
fetch(API+"/api/admin").then(function(r){return r.json()}).then(function(data){
var list=document.getElementById("roomList");
var names=Object.keys(data);
if(names.length==0){
list.innerHTML='<div class="empty-state"><div class="icon">💜</div><h3>Aguardando clientes</h3><p>Quando um cliente entrar, aparecerá aqui</p></div>';
return;
}
list.innerHTML="";
for(var i=0;i<names.length;i++){
var n=names[i],info=data[n];
var btn=document.createElement("button");
btn.className="room-btn "+(n=="sasa"?"sasa":"kael");
if(n==cr)btn.classList.add("active");
btn.dataset.room=n;
var lastMsg=info.msgs.length>0?info.msgs[info.msgs.length-1].msg:"Sem mensagens";
btn.innerHTML='<div class="avatar">'+(n=="sasa"?"🌸":"✨")+'</div><div class="info"><div class="name">'+(n=="sasa"?"Mei Mei":"Kael")+'</div><div class="preview">'+lastMsg.substring(0,25)+'</div></div><span class="room-badge">'+info.total+'</span>';
btn.onclick=function(){selectRoom(this.dataset.room)};
list.appendChild(btn);
}
}).catch(function(e){log("erro salas: "+e.message)});
}

function enviar(){
var inp=document.getElementById("inp"),msg=inp.value.trim();
if(!msg||!cr)return;
inp.value="";
fetch(API+"/api/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({room:cr,de:"mateuzinho",msg:msg})})
.then(function(r){return r.json()}).then(function(){pollMsgs()})
.catch(function(e){log("erro enviar: "+e.message)});
}

function limparTudo(){
if(!cr||!confirm("Limpar conversa com "+cr+"?"))return;
fetch(API+"/api/clear?room="+encodeURIComponent(cr)).then(function(){
lt=0;document.getElementById("statTotal").textContent="0";
document.getElementById("msgs").innerHTML='<div class="empty-state"><div class="icon">💜</div><h3>Conversa limpa!</h3></div>';
atualizarSalas();
});
}

document.getElementById("btnSend").addEventListener("click",enviar);
document.getElementById("inp").addEventListener("keypress",function(e){if(e.key=="Enter")enviar()});

log("Admin v4 iniciado");
atualizarSalas();
setInterval(atualizarSalas,3000);
</script></body></html>
