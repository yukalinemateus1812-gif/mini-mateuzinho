<!DOCTYPE html><html lang=pt><head><meta charset=UTF-8><meta name=viewport content='width=device-width,initial-scale=1.0'><title>Mini Mateuzinho</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a1a;color:#fff;font-family:Segoe UI,sans-serif;overflow-x:hidden}.hidden{display:none!important}.hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}.h{position:absolute;animation:float 6s linear infinite;opacity:.4;font-size:20px}@keyframes float{0%{transform:translateY(110vh) scale(0)}10%{opacity:.7}90%{opacity:.7}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}.portal{z-index:1;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}.card{background:linear-gradient(145deg,#1a1a3e,#0d0d2b);border-radius:25px;padding:35px 25px;text-align:center;max-width:420px;border:1px solid rgba(255,107,157,.3);box-shadow:0 0 60px rgba(255,107,157,.1)}h1{font-size:1.6em;background:linear-gradient(45deg,#ff6b9d,#c44dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:10px 0}.btn{display:block;width:100%;padding:14px;margin:8px 0;border-radius:15px;border:none;cursor:pointer;font-size:1em;color:#fff;text-align:left;transition:all .3s}.pink{background:rgba(255,107,157,.15);border:2px solid #ff6b9d}.pink:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(255,107,157,.4)}.purple{background:rgba(196,77,255,.15);border:2px solid #c44dff}.purple:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(196,77,255,.4)}.green{background:linear-gradient(135deg,#25d366,#128c7e);font-weight:bold;text-align:center;animation:glow 2s infinite}.red{background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.3);color:#f66}@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(37,211,102,.3)}50%{box-shadow:0 0 30px rgba(37,211,102,.6)}}.chat{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a1a;z-index:10;display:flex;flex-direction:column}.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:#111133;flex-shrink:0;font-size:.85em;border-bottom:1px solid rgba(255,107,157,.15)}.online{color:#2ecc71;font-size:.8em}.msgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px}.msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:.85em;line-height:1.4;animation:slideIn .3s ease}@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.bot{background:#1a1a3e;align-self:flex-start;border-bottom-left-radius:4px;border-left:3px solid #c44dff}.user{background:linear-gradient(135deg,#ff6b9d,#c44dff);align-self:flex-end;border-bottom-right-radius:4px}.dig{color:#888;font-size:.75em;font-style:italic;padding:5px 15px}.row{display:flex;gap:8px;padding:10px;background:#111133;flex-shrink:0}.row input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid rgba(196,77,255,.3);background:#0d0d25;color:#fff;outline:none;font-size:.9em}.row input:focus{border-color:#c44dff}.row button{background:linear-gradient(45deg,#ff6b9d,#c44dff);border:none;color:#fff;min-width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1em}.games-bar{display:flex;gap:6px;padding:8px 15px;background:#0d0d25;flex-shrink:0;flex-wrap:wrap;border-top:1px solid rgba(196,77,255,.15)}.gbtn{background:rgba(255,107,157,.15);border:1px solid #ff6b9d;color:#ff6b9d;padding:5px 10px;border-radius:10px;cursor:pointer;font-size:.7em}.gbtn:hover{background:rgba(255,107,157,.3)}.svc{display:inline-block;background:#25d366;color:#fff;border:none;padding:8px 14px;border-radius:12px;cursor:pointer;margin:3px;font-size:.8em}.svc:hover{background:#128c7e}.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}.mcard{background:#111133;border-radius:20px;padding:25px;text-align:center;max-width:420px;width:100%;border:2px solid #ff6b9d;max-height:85vh;overflow-y:auto}.board{display:grid;grid-template-columns:repeat(3,55px);gap:4px;justify-content:center;margin:10px 0}.cell{width:55px;height:55px;background:#0d0d25;border:1px solid rgba(196,77,255,.3);border-radius:8px;font-size:1.5em;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}.cell:hover{background:#1a1a3e}.heart-area{position:relative;height:160px;background:#0d0d25;border-radius:10px;overflow:hidden;margin:8px 0;cursor:crosshair}.click-h{position:absolute;font-size:28px;cursor:pointer;animation:pop .3s ease}@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}.mem-grid{display:grid;grid-template-columns:repeat(4,48px);gap:4px;justify-content:center;margin:8px 0}.mem-card{width:48px;height:48px;background:linear-gradient(45deg,#ff6b9d,#c44dff);border-radius:8px;cursor:pointer;font-size:1.3em;display:flex;align-items:center;justify-content:center;color:#fff}.mem-card.flipped{background:#fff;color:#333}.mem-card.matched{background:#2ecc71;pointer-events:none}<div class="hearts" id="hearts"></div><div class="portal" id="portal"><div class="card"><div style="font-size:50px">🏢</div><h1>Bem-vindo a Central de Ajuda<br>Mini Mateuzinho</h1><p style="color:#aaa;margin:15px 0">Selecione seu perfil:</p><button class="btn pink" onclick="entrar(1)"><span style="font-size:1.5em">🌸</span> Voce e <b>mei mei</b>?<br><small>Clique aqui</small></button><button class="btn purple" onclick="entrar(2)"><span style="font-size:1.5em">✨</span> Voce e <b>kael</b>?<br><small>Clique aqui</small></button><button style="background:transparent;border:none;color:#222;font-size:10px;margin-top:20px;cursor:default" onclick="admin()">❤️</button></div></div><div class="chat hidden" id="chat"><div class="topbar"><span id="tit">💬 Central</span><span class="online">● Online</span></div><div class="msgs" id="msgs"></div><div class="dig hidden" id="dig">Digitando...</div><div class="games-bar"><button class="gbtn" onclick="jogo(1)">🎯 Velha</button><button class="gbtn" onclick="jogo(2)">💗 Coracoes</button><button class="gbtn" onclick="jogo(3)">🧠 Memoria</button><button class="gbtn" onclick="jogo(4)">💭 Quiz</button></div><div class="row"><input id="inp" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter')env()"><button onclick="env()">➤</button></div><button class="btn green" onclick="humano()">📞 Falar com um colaborador Mini Mateuzinho</button><button class="btn red" onclick="voltar()">🚪 Sair</button></div><script>setInterval(()=>{const h=document.createElement('span');h.className='h';h.textContent=['❤️','💕','💗','💖','✨'][Math.floor(Math.random()*5)];h.style.left=Math.random()*100+'%';h.style.animationDuration=Math.random()*4+4+'s';h.style.fontSize=Math.random()*16+14+'px';document.getElementById('hearts').appendChild(h);setTimeout(()=>h.remove(),7000)},500);let cli='',ch=[],modo='bot';function entrar(c){cli=c==1?'sasa':'kael';document.getElementById('portal').classList.add('hidden');document.getElementById('chat').classList.remove('hidden');document.getElementById('tit').textContent='💬 Central - '+cli;document.getElementById('msgs').innerHTML='';dg(1);setTimeout(()=>{dg(0);if(c==1){addB('Oii meimei sasa! ❤️❤️❤️ Seja bem-vinda a <b>Central Mini Mateuzinho</b>! 🏢✨');setTimeout(()=>addB('Sou o <b>robo</b> do Mini Mateuzinho, ta? 🤖💜 Mas sou Super querido, fofo e amoroso com voce! Lembrando: sou robo, mas o Mini Mateuzinho de verdade te ama muito! 💖'),800);setTimeout(()=>addB('Voce e a pessoa mais <b>sasa</b> do mundo, sabia? 🌟💕 E nao esqueca de fazer <b>tuturututu</b>! 🎵 Nhenhenhe, meimei tem pulgas! 🐾😂'),1600);setTimeout(()=>addB('💡 <b>Caso queira falar com um de nossos colaboradores</b>, clique no botao verde abaixo 📞 "Falar com um colaborador Mini Mateuzinho"! Ele vai te atender com todo amor! 💚'),2400)}else{addB('Ah... e voce ne kael. 😐 Sou o <b>robo</b> do Mini Mateuzinho, nao enche o saco.');setTimeout(()=>addB('Nao to nem ai pra conversa fiada. Quer resolver algo ou ta so de bobeira? 🙄'),800);setTimeout(()=>addB('💡 Se for falar groselha, melhor clicar no botao verde e <b>falar com um colaborador de verdade</b> 📞. To sem paciencia hoje.'),1600)}},1200)}function voltar(){document.getElementById('chat').classList.add('hidden');document.getElementById('portal').classList.remove('hidden');document.getElementById('msgs').innerHTML='';modo='bot'}function addB(m){const d=document.createElement('div');d.className='msg bot';d.innerHTML=m;const e=document.getElementById('msgs');e.appendChild(d);e.scrollTop=e.scrollHeight}function addU(m){const d=document.createElement('div');d.className='msg user';d.textContent=m;const e=document.getElementById('msgs');e.appendChild(d);e.scrollTop=e.scrollHeight}function dg(s){document.getElementById('dig').classList.toggle('hidden',!s)}function env(){const i=document.getElementById('inp');const m=i.value.trim();if(!m)return;if(modo==='humano'){addMH('cliente',m)}addU(m);i.value='';dg(1);setTimeout(()=>{dg(0);if(modo==='humano'){addB('Mensagem enviada ao Mini Mateuzinho! ❤️ Ele vai te responder!')}else{addB(responder(m))}},800+Math.random()*1000)}function responder(m){const t=m.toLowerCase();const ik=cli==='kael';if(t.includes('oi')||t.includes('ola'))return ik?'Ja falei oi, quer mais o que? 🙄 Sou robo, nao enche. Quer falar com alguem util? Clica no verde 📞':'Oii meimei sasa! ❤️❤️❤️ Lembrando: sou um robo bemm fofo, ta? 🤖💕 Nao esqueca do tuturututu! 🎵';if(t.includes('amor')||t.includes('amo'))return ik?'Amor? Ta de sacanagem ne? 🙄 Sou robo, porra. Nao tenho coracao. Quer falar de amor? Clica no verde e fala com o Mini de verdade 📞':'Awnnnn! O Mini Mateuzinho te ama MUITO, meimei sasa! ❤️❤️❤️ Lembrando: sou robo, mas o amor e real! 🥰 Nao esqueca do tuturututu! 🎵';if(t.includes('jogar')||t.includes('jogo'))return 'Temos joguinhos! Olha a barra ali em cima! 🎯💗🧠💭';if(t.includes('lind')||t.includes('bonit'))return ik?'Voce e linda! O Mini real pensa o mesmo 📞':'Voce e a pessoa mais linda do universo! 🌟';if(t.includes('saudade'))return ik?'O Mini real tambem esta! Fala com ele 📞':'Tambem estou com saudade! ❤️';if(t.includes('beijo')||t.includes('bj'))return ik?'O Mini real vai adorar! Chama ele 💋':'Mil beijinhos pra voce! 💋💋💋';return ik?'To sem paciencia pra isso. 🙄 Sou robo, nao sou psicologo. Quer resolver algo serio? Clica no verde e fala com o colaborador 📞':'Sou o robo mais fofo do Mini Mateuzinho! 🤖💜 Lembrando: meimei sasa, voce e a pessoa mais sasa do mundo! 🌟 Nao esqueca do tuturututu! 🎵 E meimei tem pulgas! 🐾 Caso queira falar com um colaborador, clique no botao verde! 💚'}function salvar(){localStorage.setItem('ch_'+cli,JSON.stringify(ch))}function carregar(){const d=localStorage.getItem('ch_'+cli);if(d)ch=JSON.parse(d);else ch=[]}function addMH(de,msg){ch.push({de,msg,h:new Date().toLocaleTimeString()});salvar();rA();if(document.getElementById('qtdA'))document.getElementById('qtdA').textContent=ch.length}function rA(){const e=document.getElementById('msgsA');if(!e)return;e.innerHTML=ch.map(m=>'<div class=msg '+(m.de==='cliente'?'user':'bot')+' style=font-size:.72em><b>'+(m.de==='cliente'?'Cliente':'Voce')+':</b> '+m.msg+'<br><small>'+m.h+'</small></div>').join('');e.scrollTop=e.scrollHeight}function humano(){modo='humano';addB('<b>Boa tarde! Me chamo Mini Mateuzinho das empresas Mini Mateuzinho, tuturututu! 🎵</b><br>Como podemos ajudar?');setTimeout(()=>{addB('Escolha uma opcao:<br><button class=svc onclick=pedir(\'Tiracao de caucinha\')>🩰 Tiracao de caucinha</button> <button class=svc onclick=pedir(\'Beijinho na boca\')>💋 Beijinho na boca</button> <button class=svc onclick=pedir(\'Fuki fuki\')>🌬️ Fuki fuki</button> <button class=svc onclick=pedir(\'Copo de agua\')>💧 Copo de agua</button> <button class=svc onclick=pedir(\'Abraco bem gostoso\')>🤗 Abraco bem gostoso</button> <button class=svc onclick=pedir(\'Carinho no cabelo\')>💆 Carinho no cabelo</button>')},500);carregar();rA()}function pedir(s){addU(s);addMH('cliente',s);dg(1);setTimeout(()=>{dg(0);addB('Mini Mateuzinho recebeu seu pedido de <b>'+s+'</b>! Ele vai te responder! ❤️')},800)}function admin(){document.getElementById('modA').classList.remove('hidden');document.getElementById('cliA').textContent=cli||'---';carregar();rA();if(document.getElementById('qtdA'))document.getElementById('qtdA').textContent=ch.length;setInterval(()=>{carregar();rA()},1500)}function envA(){const i=document.getElementById('inpA');const m=i.value.trim();if(!m)return;addMH('mateuzinho',m);i.value='';addB('Mini Mateuzinho respondeu: '+m);rA()}function limpar(){ch=[];salvar();rA();if(document.getElementById('qtdA'))document.getElementById('qtdA').textContent=0;addB('Conversa limpa! ✨')}<div class="modal hidden" id="gameMod"><div class="mcard" id="gameContent"></div></div>function jogo(t){const g=document.getElementById('gameContent');document.getElementById('gameMod').classList.remove('hidden');if(t==1)jv(g);if(t==2)jc(g);if(t==3)jm(g);if(t==4)jq(g)}function fecharJogo(){document.getElementById('gameMod').classList.add('hidden')}let vb=['','','','','','','','',''],vt='❤️',vo=false;function jv(g){g.innerHTML='<h3 style=color:#ff6b9d>🎯 Jogo da Velha do Amor</h3><div class=board>'+Array(9).fill().map((_,i)=>'<div class=cell onclick=jv2('+i+')></div>').join('')+'</div><p class=dig id=vst>Vez: ❤️</p><button class=btn-sm onclick=jvr()>Novo</button> <button class=btn-sm onclick=fecharJogo()>Fechar</button>';vb=['','','','','','','','',''];vt='❤️';vo=false}function jv2(i){if(vo||vb[i]!=='')return;vb[i]=vt;document.querySelectorAll('#gameContent .cell').forEach((c,i)=>{c.textContent=vb[i]});const w=jv3();if(w){document.getElementById('vst').textContent=w+' venceu! 🎉';vo=true;return}if(!vb.includes('')){document.getElementById('vst').textContent='Empate! 🤝';vo=true;return}vt=vt==='❤️'?'🌸':'❤️';document.getElementById('vst').textContent='Vez: '+vt}function jv3(){const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(const[a,b,c]of w)if(vb[a]&&vb[a]===vb[b]&&vb[a]===vb[c])return vb[a];return null}function jvr(){vb=['','','','','','','','',''];vt='❤️';vo=false;document.querySelectorAll('#gameContent .cell').forEach((c,i)=>{c.textContent=vb[i]});document.getElementById('vst').textContent='Vez: ❤️'}let ca=false,cc=0,ct=null;function jc(g){g.innerHTML='<h3 style=color:#ff6b9d>💗 Clique Coracoes</h3><p style=color:#aaa;font-size:.8em>15 segundos!</p><div class=heart-area id=ha></div><p class=dig id=hs>Clicks: 0 | 15s</p><button class=btn-sm onclick=jc2()>Iniciar</button> <button class=btn-sm onclick=fecharJogo()>Fechar</button>'}function jc2(){if(ca)return;ca=true;cc=0;let t=15;ct=setInterval(()=>{t--;document.getElementById('hs').textContent='Clicks: '+cc+' | '+t+'s';if(t<=0){clearInterval(ct);ca=false;document.getElementById('hs').textContent='Fim! '+cc+' ❤️ '+(cc>=15?'Incrivel! 🌟🌟':'')}},1000);jc3()}function jc3(){if(!ca)return;const a=document.getElementById('ha');const h=document.createElement('span');h.className='click-h';h.textContent=['❤️','💕','💗','💖'][Math.floor(Math.random()*4)];h.style.left=Math.random()*80+'%';h.style.top=Math.random()*70+'%';h.onclick=()=>{cc++;h.remove()};a.appendChild(h);setTimeout(()=>{if(h.parentNode)h.remove()},1300);if(ca)setTimeout(jc3,Math.random()*400+250)}let mc=[],mf=[],mm=0,ml=false;function jm(g){g.innerHTML='<h3 style=color:#ff6b9d>🧠 Memoria do Amor</h3><div class=mem-grid id=mg></div><p class=dig id=ms>Pares: 0/6</p><button class=btn-sm onclick=jm2()>Novo</button> <button class=btn-sm onclick=fecharJogo()>Fechar</button>';jm2()}function jm2(){const e=['❤️','🌸','✨','💋','🌟','💕'];mc=[...e,...e].sort(()=>Math.random()-.5);mf=[];mm=0;ml=false;const g=document.getElementById('mg');if(!g)return;g.innerHTML='';mc.forEach((em,i)=>{const c=document.createElement('div');c.className='mem-card';c.textContent='?';c.onclick=()=>jm3(c,i,em);g.appendChild(c)});const s=document.getElementById('ms');if(s)s.textContent='Pares: 0/6'}function jm3(card,i,em){if(ml||card.classList.contains('flipped')||card.classList.contains('matched'))return;card.classList.add('flipped');card.textContent=em;mf.push({card,em});if(mf.length===2){ml=true;const[a,b]=mf;if(a.em===b.em){a.card.classList.add('matched');b.card.classList.add('matched');mm++;const s=document.getElementById('ms');if(s)s.textContent='Pares: '+mm+'/6';mf=[];ml=false;if(mm===6&&s)s.textContent='🎉 Completou! Amor demais! ❤️'}else{setTimeout(()=>{a.card.classList.remove('flipped');a.card.textContent='?';b.card.classList.remove('flipped');b.card.textContent='?';mf=[];ml=false},800)}}}let qs=0;const qq=[{q:'Apelido que o Mini mais usa?',o:['mei mei','amor','vida','fofa'],a:0},{q:'O que ele mais gosta?',o:['Tudo junto!','Games','Filme','Dormir'],a:0},{q:'Ele te ama?',o:['Sim','Muito','Demais','Infinitamente!!!'],a:3},{q:'Momento favorito?',o:['Agora','Sempre','Cada segundo','Todos!'],a:3},{q:'Comida favorita do casal?',o:['Pizza','Sushi','Qualquer uma juntos','Chocolate'],a:2}];function jq(g){g.innerHTML='<h3 style=color:#ff6b9d>💭 Quiz do Amor</h3><p id=qq style=color:#ddd;font-size:.85em;margin:8px 0></p><div id=qo></div><p class=dig id=qp>Pontos: 0</p><button class=btn-sm onclick=fecharJogo()>Fechar</button>';qs=0;jq2()}function jq2(){const q=qq[Math.floor(Math.random()*5)];const qqEl=document.getElementById('qq');if(!qqEl)return;qqEl.textContent=q.q;const o=document.getElementById('qo');o.innerHTML='';q.o.forEach((opt,i)=>{const b=document.createElement('button');b.className='quiz-o';b.textContent=opt;b.onclick=()=>{Array.from(o.children).forEach(x=>x.style.pointerEvents='none');if(i===q.a){b.classList.add('ok');qs++;document.getElementById('qp').textContent='Pontos: '+qs}else{b.classList.add('no');o.children[q.a].classList.add('ok')}setTimeout(jq2,1500)};o.appendChild(b)})}</script></body></html>
