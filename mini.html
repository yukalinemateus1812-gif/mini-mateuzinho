<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mini Mateuzinho • Central de Relacionamento</title>
<style>
:root{--bg:#0a0a1a;--bg2:#111133;--bg3:#0d0d25;--pink:#ff6b9d;--purple:#c44dff;--green:#25d366;--text:#e0e0e0;--text2:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
.hidden{display:none!important}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:linear-gradient(145deg,#1a1a3e,#0d0d2b);border-radius:28px;padding:45px 35px;text-align:center;max-width:440px;width:100%;border:1px solid rgba(255,107,157,.2);box-shadow:0 0 80px rgba(138,43,226,.15),0 20px 60px rgba(0,0,0,.3);backdrop-filter:blur(10px)}
.login-card .logo{font-size:50px;margin-bottom:10px}
.login-card h1{font-size:1.6em;background:linear-gradient(45deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:5px 0}
.login-card .sub{color:var(--text2);font-size:.8em;margin-bottom:20px}
.btn{display:block;width:100%;padding:16px;margin:10px 0;border-radius:14px;cursor:pointer;font-size:1em;color:#fff;transition:all .3s;font-weight:600;text-align:left}
.btn-sasa{background:linear-gradient(135deg,rgba(255,107,157,.2),rgba(255,107,157,.05));border:2px solid var(--pink)}
.btn-sasa:hover{background:linear-gradient(135deg,rgba(255,107,157,.4),rgba(255,107,157,.15));transform:translateY(-2px)}
.btn-kael{background:linear-gradient(135deg,rgba(196,77,255,.2),rgba(196,77,255,.05));border:2px solid var(--purple)}
.btn-kael:hover{background:linear-gradient(135deg,rgba(196,77,255,.4),rgba(196,77,255,.15));transform:translateY(-2px)}
.btn-admin{background:transparent;border:1px dashed rgba(255,255,255,.15);color:var(--text2);font-size:.75em;margin-top:15px;text-align:center}
.btn-admin:hover{background:rgba(255,255,255,.03);color:var(--pink)}
.chat{display:flex;flex-direction:column;height:100vh}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:linear-gradient(180deg,var(--bg2),rgba(17,17,51,.8));border-bottom:1px solid rgba(255,107,157,.15);min-height:64px;backdrop-filter:blur(8px)}
.chat-header .title{font-weight:700;font-size:1em;background:linear-gradient(45deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.chat-header .status{font-size:.7em;color:var(--green);display:flex;align-items:center;gap:4px}
.chat-header .status::before{content:'';width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.games-bar{display:flex;gap:6px;padding:8px 20px;background:rgba(0,0,0,.3);overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.03)}
.games-bar button{background:linear-gradient(135deg,rgba(196,77,255,.1),rgba(255,107,157,.05));border:1px solid rgba(255,107,157,.15);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.7em;white-space:nowrap;transition:all .2s;flex-shrink:0}
.games-bar button:hover{background:linear-gradient(135deg,rgba(196,77,255,.2),rgba(255,107,157,.1));border-color:var(--purple)}
.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:6px}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,107,157,.2);border-radius:2px}
.msg-row{display:flex;gap:8px;max-width:82%;animation:msgIn .3s ease}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.system{align-self:center;max-width:92%}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;font-weight:700}
.msg-row.bot .msg-avatar{background:rgba(255,107,157,.15)}
.msg-row.user .msg-avatar{background:rgba(196,77,255,.15)}
.msg-bubble{background:var(--bg2);padding:10px 14px;border-radius:16px;font-size:.82em;line-height:1.5}
.msg-row.bot .msg-bubble{border-bottom-left-radius:4px;border-left:2px solid var(--pink)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,rgba(255,107,157,.25),rgba(196,77,255,.2));border-bottom-right-radius:4px}
.msg-row.system .msg-bubble{background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.15);font-size:.75em;color:#a0e0b0;text-align:center}
.msg-bubble .sender{font-size:.6em;color:var(--pink);font-weight:700}
.msg-bubble .time{font-size:.6em;color:var(--text2);margin-top:3px;text-align:right}
.input-area{display:flex;gap:10px;padding:14px 24px;background:linear-gradient(0deg,var(--bg2),rgba(17,17,51,.8));border-top:1px solid rgba(255,107,157,.15);backdrop-filter:blur(8px)}
.input-area input{flex:1;padding:12px 16px;border-radius:25px;border:1px solid rgba(196,77,255,.15);background:var(--bg3);color:#fff;outline:none;font-size:.85em}
.input-area input:focus{border-color:var(--purple)}
.input-area button{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:#fff;min-width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:1.1em}
.input-area button:hover{transform:scale(1.05)}
</style>
</head><body><!-- LOGIN -->
<div class="login" id="login">
<div class="login-card">
<div class="logo">🏢💜</div>
<h1>Super Mini Mateuzinho</h1>
<p class="sub" style="color:var(--pink);font-weight:600;font-size:.85em">Empresas Super Mini Mateuzinho</p>
<p class="sub">Central de Relacionamento com o Cliente<br>Atendimento 24 horas • 7 dias por semana</p>
<button class="btn btn-sasa" onclick="entrar(1)">🌸 Entrar como <b>Mei Mei Sasa</b></button>
<button class="btn btn-kael" onclick="entrar(2)">✨ Entrar como <b>Kael</b></button>
<p style="color:var(--text2);font-size:.65em;margin-top:25px">Mini Mateuzinho © 2026 • Todos os direitos reservados<br><span style="font-size:.85em">Atendimento com amor 24h 💜</span></p>
</div></div>

<!-- CHAT -->
<div class="chat hidden" id="chat">
<div class="chat-header">
<div><span class="title" id="tit">Super Mini Mateuzinho</span><br><span style="font-size:.6em;color:var(--text2)">Central de Relacionamento</span></div>
<div class="status" id="st">● Online</div>
<div class="actions">
<button onclick="humano()" id="btnHuman" style="background:var(--green);color:#fff;border:none;padding:10px 18px;border-radius:20px;cursor:pointer;font-weight:700;font-size:.82em;animation:glowBtn 2s infinite">📞 Solicitar Atendimento</button>
<button onclick="voltar()" style="background:rgba(255,0,0,.1);color:#f66;border:1px solid rgba(255,0,0,.3);padding:10px 16px;border-radius:20px;cursor:pointer;font-size:.78em">🚪 Sair</button>
</div>
</div>
<div class="games-bar">
<button onclick="jogo(1)">🎯 Velha</button>
<button onclick="jogo(2)">💗 Corações</button>
<button onclick="jogo(3)">🧠 Memória</button>
<button onclick="jogo(4)">💭 Quiz</button>
<button onclick="jogo(5)">📝 Forca</button>
<button onclick="jogo(6)">🎲 Verdade</button>
</div>
<div class="msgs" id="msgs"></div>
<div class="input-area">
<input id="inp" placeholder="Digite sua mensagem..." onkeypress="if(event.key=='Enter')env()">
<button onclick="env()">➤</button>
</div>
</div>

<!-- GAME PANEL -->
<div class="panel hidden" id="gamePanel"><div class="pcard" id="gameCard"></div></div><script>
var API="";
var cli="",room="",modo="bot",lastTotal=0,pollHumano=null;

function log(m){console.log("[CHAT]",m)}

function entrar(c){
cli=c==1?"sasa":"kael";room=cli;
document.getElementById("login").classList.add("hidden");
document.getElementById("chat").classList.remove("hidden");
document.getElementById("tit").innerHTML="Super Mini Mateuzinho<br><span style='font-size:.6em;color:var(--text2)'>Central de Relacionamento</span>";
document.getElementById("st").innerHTML="● Online • "+(c==1?"🌸 Mei Mei":"✨ Kael");
document.getElementById("btnHuman").innerHTML="📞 Solicitar Atendimento";
apiSend("sistema","🔔 "+cli+" entrou na central");
if(c==1){
addB("Oii meimei sasa! ❤️❤️❤️ Seja bem-vinda a Central Mini Mateuzinho!","🤖");
setTimeout(function(){addB("Sou o robo do Mini Mateuzinho, ta? Mas sou Super querido, fofo e amoroso! Lembrando: sou robo, mas o Mini de verdade te ama!","🤖")},800);
setTimeout(function(){addB("Voce e a pessoa mais sasa do mundo! Nao esqueca do tuturututu! Nhenhenhe, meimei tem pulgas!","🤖")},1600);
setTimeout(function(){addB("Caso queira falar com um colaborador, clique no botao verde acima! Ou jogue um joguinho na barra de jogos! 🎮","🤖")},2400);
}else{
addB("Ah... e voce ne kael. Sou o robo do Mini Mateuzinho.","🤖");
setTimeout(function(){addB("Nao to nem ai pra conversa fiada. Quer resolver algo ou ta de bobeira?","🤖")},800);
setTimeout(function(){addB("Se for falar groselha, melhor clicar no botao verde e falar com um colaborador de verdade.","🤖")},1600);
}
}

function addB(m,av){av=av||"🤖";var d=document.createElement("div");d.className="msg-row bot";d.innerHTML='<div class="msg-avatar">'+av+'</div><div class="msg-bubble">'+m+'<div class="time">'+new Date().toLocaleTimeString().slice(0,5)+'</div></div>';document.getElementById("msgs").appendChild(d);var msgs=document.getElementById("msgs");msgs.scrollTop=msgs.scrollHeight}

function addU(m){var d=document.createElement("div");d.className="msg-row user";d.innerHTML='<div class="msg-avatar">👤</div><div class="msg-bubble">'+m+'<div class="time">'+new Date().toLocaleTimeString().slice(0,5)+'</div></div>';document.getElementById("msgs").appendChild(d);var msgs=document.getElementById("msgs");msgs.scrollTop=msgs.scrollHeight}

function addS(m){var d=document.createElement("div");d.className="msg-row system";d.innerHTML='<div class="msg-bubble">'+m+'</div>';document.getElementById("msgs").appendChild(d);var msgs=document.getElementById("msgs");msgs.scrollTop=msgs.scrollHeight}

function env(){
var i=document.getElementById("inp");var m=i.value.trim();if(!m)return;
addU(m);i.value="";
if(modo=="humano"){addMH("cliente",m);addS("📨 Mensagem enviada ao Mini Mateuzinho! Ele ja pode ver e responder! 💜");return}
addB(responder(m));
}

function r(){return Math.floor(Math.random()*3)}
function r5(){return Math.floor(Math.random()*5)}
function r6(){return Math.floor(Math.random()*6)}

function responder(m){
var t=m.toLowerCase();var ik=cli=="kael";
if(t.indexOf("oi")>=0||t.indexOf("ola")>=0||t.indexOf("oie")>=0||t.indexOf("hello")>=0||t.indexOf("hey")>=0||t.indexOf("eae")>=0){
var s=["Oii meimei sasa! ❤️❤️❤️ Sou o robo mais fofo do Mini Mateuzinho! Tuturututu! 🎵","Olaa meimei sasa! 💖 Que bom te ver por aqui! Tuturututu! 🎵","Meimei sasa! ❤️ Chegou bem! Sou o robo fofo do Mini Mateuzinho! 🌟 Tuturututu! 🎵"];
var k=["Ola. O que voce quer? Nao tenho o dia todo.","Ola. Resolve logo isso ai.","Diz logo o que precisa."];
return ik?k[r()]:s[r()];
}
if(t.indexOf("tudo bem")>=0||t.indexOf("como vai")>=0){
var s=["Tudo otimo meimei sasa! ❤️ Ainda melhor agora falando com voce! Tuturututu! 🎵","To muito bem! 💖 Ainda mais recebendo voce aqui na Central! Tuturututu! 🎵","Maravilhoso! 🌟 Falando com a pessoa mais sasa do mundo, como nao estar bem? Tuturututu! 🎵"];
var k=["Nao interessa como eu to, sou robo. O que voce precisa?","To ocupado. Fala logo.","Sobrevivendo. Qual o problema?"];
return ik?k[r()]:s[r()];
}
if(t.indexOf("amor")>=0||t.indexOf("amo")>=0||t.indexOf("te amo")>=0){
var s=["Awnnnn meimei sasa! ❤️❤️❤️ O Mini Mateuzinho te ama MUITO, ta? Voce e a pessoa mais sasa do mundo! 🌟💕 Tuturututu! 🎵","Que lindo! 💖 O Mini Mateuzinho te ama demais tambem! Sou so o robo, mas posso garantir: voce e TUDO pra ele! 🌟 Tuturututu! 🎵","Ownnn ❤️ O Mini se derrete todo por voce! Eu sou robo, mas ate eu sinto o amor no ar! 💕 Tuturututu! 🎵"];
var k=["Amor? Que papo e esse? Sou robo, nao tenho sentimentos. Clica no verde.","Nao me venha com essas coisas. Sou robo. Clica no verde e fala com o Mini.","Amor e coisa de humano. Nao tenho nada com isso. Verde. Clica."];
return ik?k[r()]:s[r()];
}
var fb=["Humm... meimei sasa! 🤖💜 Nao entendi muito bem, mas o Mini Mateuzinho com certeza entende! Quer jogar um joguinho? 🎮 Olha la em cima: 🎯 Velha, 💗 Coracoes, 🧠 Memoria, 💭 Quiz!","Ai ai meimei sasa! 💖 Sou so um robo bobinho, mas quero te ver feliz! Que tal um joguinho? 🎮 Tuturututu! 🎵","O Mini Mateuzinho ia responder isso com muito amor! 💜 Quer falar com ele? Clica no botao verde! 🌟 Ou joga algo! 🎮"];
var fk=["Sou robo. Nao tenho tempo pra conversa mole. Quer resolver algo? Clica no verde.","Ta de conversa fiada ai? Resolve logo ou clica no verde.","Nao entendi nada. Fala direito ou clica no verde.","Que papo e esse? To sem paciencia. Verde. Clica.","Mais respeito. Sou robo mas mereco consideracao. Clica no verde.","Nao to afim de joguinho. Se quer resolver algo, clica no verde."];
return ik?fk[r6()]:fb[r()];
}
function apiSend(de,msg,cb){
fetch(API+"/api/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({room:room,de:de,msg:msg})})
.then(function(r){return r.json()}).then(function(d){if(cb)cb(d);lastTotal=d.total});
}
function apiPoll(cb){
fetch(API+"/api/msgs?room="+encodeURIComponent(room)+"&since="+lastTotal)
.then(function(r){return r.json()}).then(function(d){
if(d.msgs.length>0){for(var i=0;i<d.msgs.length;i++){lastTotal=d.total;if(cb)cb(d.msgs);}}
});
}
function apiLoad(cb){
fetch(API+"/api/msgs?room="+encodeURIComponent(room)+"&since=0")
.then(function(r){return r.json()}).then(function(d){lastTotal=d.total;if(cb)cb();});
}
function addMH(de,msg){apiSend(de,msg);}

var respostasServico={
"Tiracao de caucinha":"🩰 Opa! Servico de tiracao de caucinha solicitado! O Mini tira a caucinha com todo amor do mundo, devagarinho... e ainda da um beijinho no pezinho! 👣💋 Aguarde o Mini que ele ja vai te atender!",
"Beijinho na boca":"💋 Hummm beijinho na boca! Esse e o servico mais pedido da Central! O Mini vai te encher de beijos bem gostosos! 😘💕 Aguarde so um pouquinho que ele ja aparece!",
"Fuki fuki":"🌬️ Fuki fuki ativado! O Mini vai assoprar bem de leve, tipo uma brisa quentinha... fuuuuuki fuuuuuki! 🌬️✨ So o Mini pode fazer esse servico especial!",
"Copo de agua":"💧 Copo de agua? O Mini traz agua na temperatura perfeita, com gelinho e tudo! 🧊💙 E ainda pergunta se quer com golinho ou sem golinho!",
"Abraco bem gostoso":"🤗 Abraco bem gostoso! Esse e TOP! O Mini da um abraco tao gostoso que ate esquece os problemas! Aperta bem forte e cheio de amor! 💜🤗",
"Carinho no cabelo":"💆 Carinho no cabelo ativado! O Mini vai passar a mao no seu cabelo bem devagarinho ate voce dormir... shhhhh... 💤💜",
"Beijo na testa":"😘 Beijo na testa! O Mini da um beijo tao carinhoso na sua testa que acalma o coracao! Coisa mais fofa do mundo! 💋💕",
"Cafune infinito":"✨ Cafune infinito! O Mini faz um cafune que parece que o tempo para! Vai ate voce pedir pra parar... mas voce nunca vai pedir! 💫💜"
};

function humano(){
modo="humano";
document.getElementById("btnHuman").innerHTML="📋 Menu de Serviços";
addB("<b>Boa tarde! Seja bem-vindo(a) à Central de Relacionamento das Empresas Super Mini Mateuzinho!</b><br>Eu sou o atendente virtual. Em que posso ajudar?","💚");
setTimeout(function(){
addB("<b>📋 MENU DE SERVICOS:</b><br>"+
'<button class="svc-btn" onclick="pedir(\'Tiracao de caucinha\')">🩰 Tiracao de caucinha</button>'+
'<button class="svc-btn" onclick="pedir(\'Beijinho na boca\')">💋 Beijinho na boca</button>'+
'<button class="svc-btn" onclick="pedir(\'Fuki fuki\')">🌬️ Fuki fuki</button>'+
'<button class="svc-btn" onclick="pedir(\'Copo de agua\')">💧 Copo de agua</button>'+
'<button class="svc-btn" onclick="pedir(\'Abraco bem gostoso\')">🤗 Abraco bem gostoso</button>'+
'<button class="svc-btn" onclick="pedir(\'Carinho no cabelo\')">💆 Carinho no cabelo</button>'+
'<button class="svc-btn" onclick="pedir(\'Beijo na testa\')">😘 Beijo na testa</button>'+
'<button class="svc-btn" onclick="pedir(\'Cafune infinito\')">✨ Cafune infinito</button>'+
"<br><span style='color:var(--text2);font-size:.7em'>💡 Ou digite seu pedido abaixo! O Mini te responde ao vivo!</span>","💚");
},600);
apiLoad(function(){
if(pollHumano)clearInterval(pollHumano);
pollHumano=setInterval(pollAdmin,1500);
});
}

function pollAdmin(){
apiPoll(function(msgs){
for(var i=0;i<msgs.length;i++){
if(msgs[i].de=="mateuzinho"){addB("<b>💚 Mini Mateuzinho:</b> "+msgs[i].msg,"💚");}
else if(msgs[i].de=="servico"){addS(msgs[i].msg);}
}
});
}

function pedir(s){
addU(s);addMH("cliente",s);
var resp=respostasServico[s]||("🔔 <b>Solicitacao registrada:</b> "+s+"! O Mini Mateuzinho ja vai te atender! 💜");
addB(resp,"💚");
apiSend("servico",resp);
}

function voltar(){
if(pollHumano){clearInterval(pollHumano);pollHumano=null;}
modo="bot";
document.getElementById("btnHuman").innerHTML="📞 Solicitar Atendimento";
document.getElementById("chat").classList.add("hidden");
document.getElementById("login").classList.remove("hidden");
document.getElementById("msgs").innerHTML="";
document.getElementById("inp").value="";
}
function jogo(t){
var c=document.getElementById("gameCard");
document.getElementById("gamePanel").classList.remove("hidden");
if(t==1)jv2(c);if(t==2)jc2(c);if(t==3)jm2(c);if(t==4)jq2(c);
if(t==5)jf2(c);if(t==6)jvd2(c);
}
function fecharJogo(){document.getElementById("gamePanel").classList.add("hidden")}

var vb,vt,vo;
function jv2(c){
vb=["","","","","","","","",""];vt="❤️";vo=false;
c.innerHTML='<h3>🎯 Jogo da Velha</h3><p class="game-info">❤️ (Mini) vs 🌸 (Voce) • Vez: <b id="jvt">❤️</b></p><div class="game-board" id="vb"></div><p id="jvs" style="color:var(--text2);font-size:.75em;margin-top:8px"></p><button class="game-btn" onclick="jvr()">Novo</button> <button class="game-btn close" onclick="fecharJogo()">Fechar</button>';
var b=document.getElementById("vb");
for(var i=0;i<9;i++){var cell=document.createElement("div");cell.className="game-cell";cell.onclick=function(){jv3(parseInt(this.dataset.i),this)};cell.dataset.i=i;b.appendChild(cell)}
}
function jv3(i,el){if(vo||vb[i]!=="")return;vb[i]=vt;el.textContent=vt;el.classList.add("taken");var w=jv4();if(w){vo=true;for(var x=0;x<w.length;x++){document.querySelectorAll("#vb .game-cell")[w[x]].classList.add("win")}document.getElementById("jvs").textContent=vt=="❤️"?"🎉 Mini (❤️) venceu!":"🎉 Voce (🌸) venceu!";return}if(vb.filter(function(x){return x===""}).length===0){document.getElementById("jvs").textContent="🤝 Empate!";vo=true;return}vt=vt=="❤️"?"🌸":"❤️";document.getElementById("jvt").textContent=vt}
function jv4(){var w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(var i=0;i<w.length;i++){if(vb[w[i][0]]!==""&&vb[w[i][0]]===vb[w[i][1]]&&vb[w[i][1]]===vb[w[i][2]])return w[i]}return null}
function jvr(){vb=["","","","","","","","",""];vt="❤️";vo=false;document.getElementById("jvt").textContent="❤️";document.getElementById("jvs").textContent="";var cells=document.querySelectorAll("#vb .game-cell");for(var i=0;i<cells.length;i++){cells[i].textContent="";cells[i].className="game-cell"}}

var ca2=false,cc2=0,ct2=null;
function jc2(c){
ca2=false;cc2=0;if(ct2)clearInterval(ct2);
c.innerHTML='<h3>💗 Clique Corações</h3><p class="game-info">Clique nos corações! ⏱ <b id="jct">15</b>s</p><div class="hearts-area" id="ha"></div><p style="color:var(--purple);font-weight:700;font-size:1.2em" id="jcc">0 💗</p><button class="game-btn" onclick="jc3()">Novo</button> <button class="game-btn close" onclick="fecharJogo()">Fechar</button>';
setTimeout(function(){jc3()},500);
}
